name: Mayatara Friday matching

# Runs the weekly matching pool for the Mayatara service. Same
# GitHub-Actions-as-scheduler pattern as the other cron workflows in this repo
# (Vercel serverless can't run a persistent scheduler in production) — see
# app/api/mayatara/match/find/route.ts.
on:
  schedule:
    - cron: '30 14 * * 5' # Fridays 14:30 UTC (matches the route's own IST guard)
  workflow_dispatch: {}

jobs:
  match:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger match run
        run: |
          curl -sf -X POST "https://www.oppidx.com/api/mayatara/match/find" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
