name: Daily Telegram digest

# Posts new opportunities from the last 24h to the configured Telegram
# channel/group. Skips sending (not an error) if there's nothing new or the
# bot isn't configured yet. See app/api/cron/telegram-digest/route.ts.
on:
  schedule:
    - cron: '30 3 * * *' # 03:30 UTC = 09:00 IST daily
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Telegram digest
        run: |
          curl -sf -X GET "https://www.oppidx.com/api/cron/telegram-digest" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
