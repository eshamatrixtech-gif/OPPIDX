name: Mayatara daily pulse refresh

# Refreshes Mayatara's news-digest headlines/datapoints daily. Same
# GitHub-Actions-as-scheduler pattern as the other cron workflows in this repo
# — see app/api/mayatara/pulse/refresh/route.ts.
on:
  schedule:
    - cron: '30 0 * * *' # 00:30 UTC daily
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pulse refresh
        run: |
          curl -sf -X POST "https://www.oppidx.com/api/mayatara/pulse/refresh" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
