name: Hourly opportunity scrape

# Vercel serverless functions can't run a persistent setInterval, so this is
# what actually keeps the board "updated hourly" in production — see
# app/api/cron/scrape/route.ts and instrumentation.ts.
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scrape pass
        run: |
          curl -sf -X GET "https://www.oppidx.com/api/cron/scrape" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
